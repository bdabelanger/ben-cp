<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Weekly Status</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:        #f9f9fb;
    --surface:   #ffffff;
    --border:    #e2e2e8;
    --text:      #1a1a2e;
    --muted:     #6b6b80;
    --accent:    #4f6ef7;
    --done:      #22c55e;
    --progress:  #f59e0b;
    --todo:      #e2e2e8;
    --radius:    10px;
    --shadow:    0 2px 8px rgba(0,0,0,0.07);
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg:      #0f0f17;
        --surface: #1a1a26;
        --border:  #2e2e42;
        --text:    #e8e8f0;
        --muted:   #8888a8;
        --todo:    #2e2e42;
        --shadow:  0 2px 8px rgba(0,0,0,0.4);
    }
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem 1rem;
}

.container {
    max-width: 860px;
    margin: 0 auto;
}

/* ---------- typography ---------- */
h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
h2 { font-size: 1.2rem;  font-weight: 700; margin: 2rem 0 0.75rem;
     padding-bottom: 0.4rem; border-bottom: 2px solid var(--border); }
h3 { font-size: 1rem;    font-weight: 600; margin: 1.25rem 0 0.4rem; }
p  { margin: 0.4rem 0; }
a  { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
ul { padding-left: 1.4rem; margin: 0.3rem 0; }
li { margin: 0.15rem 0; }
strong { font-weight: 600; }

/* ---------- header card ---------- */
.report-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
}
.report-header .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.2rem;
}

/* ---------- project cards ---------- */
.project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.3rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
}
.project-card h3 { margin-top: 0; font-size: 1rem; }

/* ---------- progress bar ---------- */
.progress-wrap {
    display: flex;
    height: 10px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--todo);
    margin: 0.5rem 0;
    gap: 1px;
}
.prog-done     { background: var(--done); }
.prog-progress { background: var(--progress); }
.prog-todo     { background: var(--todo); }

/* ---------- time bar ---------- */
.time-bar-wrap {
    display: flex;
    height: 8px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--todo);
    margin: 0.3rem 0;
    max-width: 260px;
}
.time-filled   { background: var(--accent); }
.time-over     { background: #ef4444; }

/* ---------- badge / pill ---------- */
.badge {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    border-radius: 999px;
    font-size: 0.73rem;
    font-weight: 600;
    letter-spacing: 0.02em;
}
.badge-stage   { background: #dbeafe; color: #1d4ed8; }
.badge-ga      { background: #dcfce7; color: #15803d; }
.badge-beta    { background: #fef9c3; color: #854d0e; }
.badge-qa      { background: #fce7f3; color: #9d174d; }
.badge-dev     { background: #f3f4f6; color: #374151; }
.stat-row      { font-size: 0.85rem; color: var(--muted); margin: 0.2rem 0; }

@media (prefers-color-scheme: dark) {
    .badge-stage { background: #1e3a8a; color: #93c5fd; }
    .badge-ga    { background: #14532d; color: #86efac; }
    .badge-beta  { background: #713f12; color: #fde68a; }
    .badge-qa    { background: #831843; color: #fbcfe8; }
    .badge-dev   { background: #1f2937; color: #d1d5db; }
}

/* ---------- milestone list ---------- */
.milestones { list-style: none; padding: 0; margin: 0.4rem 0; }
.milestones li { font-size: 0.85rem; margin: 0.15rem 0; }

/* ---------- issue list ---------- */
.issue-list { list-style: none; padding: 0; margin: 0.4rem 0 0; }
.issue-list li {
    font-size: 0.82rem;
    padding: 0.25rem 0;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    align-items: baseline;
    flex-wrap: wrap;
}
.issue-list li:first-child { border-top: none; }
.issue-key { font-weight: 600; white-space: nowrap; }
.issue-meta { color: var(--muted); font-size: 0.78rem; white-space: nowrap; }

/* ---------- section callout ---------- */
.data-quality {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.3rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
}
.data-quality p { font-size: 0.88rem; }

/* ---------- footer ---------- */
.footer { margin-top: 2.5rem; font-size: 0.78rem; color: var(--muted); text-align: right; }

/* ---------- code / mono ---------- */
code {
    font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    font-size: 0.82rem;
    background: var(--border);
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
}

</style>
</head>
<body>
<div class="container">
<div class="report-header"><h1>Platform Weekly Status — April 5, 2026</h1><div class="subtitle">Generated April 05, 2026 at 20:51</div></div>
<h2>⚙️ Data Quality</h2>
<p>No in-progress issues found.</p>
<h2>📋 Summary</h2>
<p>---</p>
<h2>🟢 Active Projects</h2>
<div class="footer">Platform Status Pipeline · 2026-04-05 20:51</div>
</div>
</body>
</html>
